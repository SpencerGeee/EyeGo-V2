name: EyeGo Build

on:
  # Run manually from the GitHub Actions tab — pick profile and platform
  workflow_dispatch:
    inputs:
      app:
        description: Which app to build
        type: choice
        options: [rider, driver, both]
        default: both
      profile:
        description: Build profile
        type: choice
        options: [preview, production]
        default: preview
      platform:
        description: Platform
        type: choice
        options: [all, ios, android]
        default: all

  # Also auto-build on version tags (e.g. git tag v1.2.3 && git push --tags)
  push:
    tags:
      - 'v*'

# Cancel any in-progress build for the same branch/tag
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Rider app ──────────────────────────────────────────────────────────────
  rider:
    name: Rider — ${{ inputs.platform || 'all' }} (${{ inputs.profile || 'preview' }})
    runs-on: ubuntu-latest
    # Skip if the user chose "driver" only
    if: ${{ github.event_name == 'push' || inputs.app == 'rider' || inputs.app == 'both' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install monorepo dependencies
        run: npm ci

      - name: Build rider
        working-directory: apps/rider
        run: |
          eas build \
            --platform ${{ inputs.platform || 'all' }} \
            --profile ${{ inputs.profile || 'preview' }} \
            --non-interactive \
            --no-wait
        env:
          # Runtime API config — set these in GitHub → Settings → Secrets
          EXPO_PUBLIC_API_URL: ${{ secrets.RIDER_API_URL }}
          EXPO_PUBLIC_MAPBOX_TOKEN: ${{ secrets.MAPBOX_PUBLIC_TOKEN }}
          EXPO_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          # Build-time secret for Mapbox SDK download (never commit this)
          MAPBOX_DOWNLOADS_TOKEN: ${{ secrets.MAPBOX_DOWNLOADS_TOKEN }}

  # ── Driver app ─────────────────────────────────────────────────────────────
  driver:
    name: Driver — ${{ inputs.platform || 'all' }} (${{ inputs.profile || 'preview' }})
    runs-on: ubuntu-latest
    # Skip if the user chose "rider" only
    if: ${{ github.event_name == 'push' || inputs.app == 'driver' || inputs.app == 'both' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install monorepo dependencies
        run: npm ci

      - name: Build driver
        working-directory: apps/driver
        run: |
          eas build \
            --platform ${{ inputs.platform || 'all' }} \
            --profile ${{ inputs.profile || 'preview' }} \
            --non-interactive \
            --no-wait
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.DRIVER_API_URL }}
          EXPO_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
