# iOS Sideload IPA — unsigned build for Sideloadly / AltStore
#
# Builds the rider app on a free macOS runner (GitHub public repos get
# unlimited macOS minutes). The output is an unsigned .ipa — Sideloadly
# re-signs it with your free Apple ID when you install on iPhone.
#
# Usage:
#   1. Push to GitHub (public repo for free macOS minutes)
#   2. GitHub → Actions → iOS Sideload IPA → Run workflow
#   3. Download the "eyego-unsigned-ipa" artifact
#   4. Open Sideloadly on Windows → drag .ipa in → enter Apple ID → install
#
# Certificate validity: 7 days. After expiry, re-run this workflow and
# re-sideload. Takes ~30s in Sideloadly to refresh.

name: iOS Sideload IPA

on:
  workflow_dispatch:
    inputs:
      app:
        description: Which app to build
        type: choice
        options: [rider, driver]
        default: rider
      api-url:
        description: 'PC LAN IP for API server (e.g. http://192.168.1.42:5020/v1). Defaults to localhost:5020/v1 — replace with your PC IP to connect from iPhone'
        type: string
        default: 'http://localhost:5020/v1'

jobs:
  build-unsigned-ipa:
    name: Build unsigned ${{ inputs.app }}.ipa
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-engines --no-audit --no-fund

      # Xcode 16+ drops headers that @sentry/react-native 6.x expects for
      # Session Replay. We don't use replay — only basic error capture.
      # Delete the native source files and guard the import with __has_include
      # so the compiler doesn't error on the missing header.
      - name: Patch @sentry/react-native for Xcode 16 + Hermes
        run: |
          # 1) Remove Replay sources (Xcode 16 dropped headers)
          find node_modules/@sentry/react-native/ios -name "*Replay*" -delete
          sed -i '' '/__has_include/!s/#if SENTRY_TARGET_REPLAY_SUPPORTED/#if SENTRY_TARGET_REPLAY_SUPPORTED \&\& __has_include("RNSentryReplay.h")/' \
            node_modules/@sentry/react-native/ios/RNSentry.mm
          # 2) Disable Hermes Sampling Profiler — newer Hermes removed
          #    enableSamplingProfiler / disableSamplingProfiler / dumpSampledTraceToStream
          #    which are called behind #if SENTRY_PROFILING_ENABLED (line 816+).
          sed -i '' 's/#    define SENTRY_PROFILING_ENABLED 1/#    define SENTRY_PROFILING_ENABLED 0/' \
            node_modules/@sentry/react-native/ios/RNSentry.mm

      - name: Generate native iOS project (prebuild)
        working-directory: apps/${{ inputs.app }}
        run: npx expo prebuild --platform ios --clean
        env:
          EXPO_PUBLIC_APP_ENV: preview
          EXPO_PUBLIC_API_URL: ${{ inputs.api-url || 'http://localhost:5020/v1' }}

      # prebuild generates the Podfile but does NOT run `pod install`, so there is
      # no Podfile.lock / Pods sandbox. xcodebuild's "Check Pods Manifest.lock"
      # phase then aborts with "sandbox is not in sync". Install pods explicitly.
      # This also produces the .xcworkspace that the build step builds against.
      - name: Install CocoaPods dependencies
        working-directory: apps/${{ inputs.app }}/ios
        run: |
          pod install --repo-update
        env:
          # RN 0.81 generates a fresh Podfile each prebuild; New Architecture is
          # already disabled via app.json (newArchEnabled:false) → propagates to
          # RCT_NEW_ARCH_ENABLED here automatically.
          LANG: en_US.UTF-8

      - name: Build unsigned .app with xcodebuild
        working-directory: apps/${{ inputs.app }}/ios
        # EXPO_PUBLIC_* must be present HERE too — the JS bundle is produced by the
        # "Bundle React Native code and images" build phase during xcodebuild, not
        # during prebuild. Without these the API URL bakes in as the localhost
        # fallback and the sideloaded app can never reach your PC.
        env:
          EXPO_PUBLIC_APP_ENV: preview
          EXPO_PUBLIC_API_URL: ${{ inputs.api-url || 'http://localhost:5020/v1' }}
        run: |
          # Auto-detect workspace or project
          TARGET=$(find . -maxdepth 1 -name "*.xcworkspace" -type d | head -1)
          FLAG="-workspace"
          if [ -z "$TARGET" ]; then
            TARGET=$(find . -maxdepth 1 -name "*.xcodeproj" -type d | head -1)
            FLAG="-project"
            echo "Using xcodeproj: $TARGET"
          else
            echo "Using xcworkspace: $TARGET"
          fi
          if [ -z "$TARGET" ]; then
            echo "::error::No .xcworkspace or .xcodeproj directory in ios/"
            ls -la
            exit 1
          fi
          SCHEME=${TARGET%.xcworkspace}
          SCHEME=${SCHEME%.xcodeproj}
          SCHEME=${SCHEME#./}
          echo "Scheme: $SCHEME"
          xcodebuild \
            "$FLAG" "$TARGET" \
            -scheme "$SCHEME" \
            -configuration Release \
            -derivedDataPath ../build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            2>&1 | tee /tmp/xcodebuild.log; XCODE_EXIT=${PIPESTATUS[0]}
          if [ $XCODE_EXIT -ne 0 ]; then
            echo "=== RAW COMPILER ERRORS ==="
            # Match actual Xcode error: lines (prefixed by "error:", not method names
            # containing "error:" like "onAnimationFailureWithError:")
            grep -n " error:" /tmp/xcodebuild.log | head -40
            echo "=== BUNDLE COMMAND CONTEXT ==="
            # Show the actual metro bundler invocation and its output
            grep -B2 -A10 "Bundle React Native\|FATAL\|Error: bundling\|Unable to resolve\|Module.*not found\|Cannot find" /tmp/xcodebuild.log | head -50
            echo "=== BUILD FAILED (exit $XCODE_EXIT) ==="
            exit $XCODE_EXIT
          fi

      - name: Package unsigned .ipa
        working-directory: apps/${{ inputs.app }}
        run: |
          APP_PATH=$(find build/Build/Products/Release-iphoneos -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app found in build output"
            exit 1
          fi
          echo "Found .app at: $APP_PATH"

          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r "${{ inputs.app }}-unsigned.ipa" Payload/
          rm -rf Payload

          echo "IPA created: $(ls -lh ${{ inputs.app }}-unsigned.ipa)"

      - name: Upload unsigned .ipa as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.app }}-unsigned-ipa
          path: apps/${{ inputs.app }}/${{ inputs.app }}-unsigned.ipa
          retention-days: 7
